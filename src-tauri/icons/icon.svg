<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#1e1b4b" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Speech bubble -->
  <g filter="url(#shadow)">
    <path d="M280 300 Q280 230 350 230 H674 Q744 230 744 300 V560 Q744 630 674 630 H480 L380 730 L400 630 H350 Q280 630 280 560 Z" fill="url(#bubble)"/>
  </g>
  <!-- Sound waves -->
  <g stroke="#6366f1" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M430 380 Q430 430 430 480" />
    <path d="M500 340 Q500 430 500 520" />
    <path d="M570 360 Q570 430 570 500" />
    <path d="M640 390 Q640 430 640 470" />
  </g>
  <!-- Globe accent lines (subtle) -->
  <g stroke="#818cf8" stroke-width="3" fill="none" opacity="0.3">
    <ellipse cx="512" cy="850" rx="120" ry="20"/>
    <ellipse cx="512" cy="850" rx="80" ry="20"/>
    <line x1="392" y1="850" x2="632" y2="850"/>
  </g>
</svg>
